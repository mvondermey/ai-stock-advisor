name: Rolling Windows Compliance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC to catch regressions
    - cron: '0 2 * * *'

jobs:
  test-rolling-windows:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas numpy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Run rolling windows tests
      run: |
        python tests/run_rolling_windows_tests.py --verbose
    
    - name: Run specific strategy tests
      run: |
        echo "Testing 3M/1Y Ratio strategy..."
        python tests/run_rolling_windows_tests.py --strategy 3m_1y_ratio
        
        echo "Testing 1Y/3M Ratio strategy..."
        python tests/run_rolling_windows_tests.py --strategy 1y_3m_ratio
        
        echo "Testing Turnaround strategy..."
        python tests/run_rolling_windows_tests.py --strategy turnaround
        
        echo "Testing current_date parameter compliance..."
        python tests/run_rolling_windows_tests.py --strategy current_date
    
    - name: Check for static behavior patterns
      run: |
        python tests/run_rolling_windows_tests.py --strategy static_detection
    
    - name: Generate test report
      if: always()
      run: |
        echo "# Rolling Windows Test Report" > test_report.md
        echo "Generated on: $(date)" >> test_report.md
        echo "" >> test_report.md
        echo "## Test Results" >> test_report.md
        echo "- Python Version: ${{ matrix.python-version }}" >> test_report.md
        echo "- Status: ${{ job.status }}" >> test_report.md
        echo "" >> test_report.md
        echo "## Coverage" >> test_report.md
        echo "- ✅ 3M/1Y Ratio rolling windows" >> test_report.md
        echo "- ✅ 1Y/3M Ratio rolling windows" >> test_report.md
        echo "- ✅ Turnaround rolling windows" >> test_report.md
        echo "- ✅ Current date parameter compliance" >> test_report.md
        echo "- ✅ Static behavior detection" >> test_report.md
        echo "- ✅ Performance filter rolling windows" >> test_report.md
    
    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-report-python${{ matrix.python-version }}
        path: test_report.md
    
    - name: Comment PR with results
      if: github.event_name == 'pull_request' && failure()
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('test_report.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🚨 Rolling Windows Tests Failed\n\n${report}\n\nPlease fix the rolling windows implementation before merging.`
          });

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: test-rolling-windows
    if: failure()
    
    steps:
    - name: Notify on failure
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: 'failure',
            target_url: 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            description: 'Rolling windows tests failed',
            context: 'rolling-windows-tests'
          })
