# Pre-commit hooks for rolling windows compliance
# Install with: pre-commit install

repos:
  - repo: local
    hooks:
      - id: rolling-windows-tests
        name: Rolling Windows Tests
        entry: python tests/run_rolling_windows_tests.py
        language: system
        pass_filenames: false
        always_run: true
        # Only run on files that could affect strategy behavior
        files: ^(src/.*\.py|config\.py)$
        description: "Run rolling windows compliance tests"
        
      - id: current-date-parameter-check
        name: Current Date Parameter Check
        entry: python -c "
import sys
import os
import re
sys.path.append('src')

# Check for strategy function calls without current_date
pattern = r'select_\w+_stocks\([^,)]+(?!,\s*current_date)'
files_to_check = []

for root, dirs, files in os.walk('src'):
    for file in files:
        if file.endswith('.py'):
            filepath = os.path.join(root, file)
            with open(filepath, 'r') as f:
                content = f.read()
                if re.search(pattern, content):
                    files_to_check.append(filepath)

if files_to_check:
    print('❌ Missing current_date parameter detected in:')
    for f in files_to_check:
        print(f'   {f}')
    sys.exit(1)
else:
    print('✅ All strategy calls include current_date parameter')
"
        language: system
        pass_filenames: false
        always_run: true
        files: ^(src/.*\.py)$
        description: "Check for missing current_date parameters"
        
      - id: static-behavior-detection
        name: Static Behavior Detection
        entry: python -c "
import sys
import os

# Look for patterns that indicate static behavior
static_patterns = [
    r'max\(latest_dates\)',  # Using max date instead of current_date
    r'current_date is None',  # Not handling current_date properly
    r'timedelta\(days=365\)',  # Hardcoded periods (should use constants)
    r'timedelta\(days=90\)',
    r'timedelta\(days=21\)',
]

issues_found = []

for root, dirs, files in os.walk('src'):
    for file in files:
        if file.endswith('.py'):
            filepath = os.path.join(root, file)
            with open(filepath, 'r') as f:
                content = f.read()
                for i, line in enumerate(content.split('\n'), 1):
                    for pattern in static_patterns:
                        if re.search(pattern, line):
                            issues_found.append(f'{filepath}:{i}: {line.strip()}')

if issues_found:
    print('⚠️  Potential static behavior patterns found:')
    for issue in issues_found[:10]:  # Limit output
        print(f'   {issue}')
    if len(issues_found) > 10:
        print(f'   ... and {len(issues_found) - 10} more')
    print('🔍 Review these patterns to ensure rolling windows work correctly')
else:
    print('✅ No obvious static behavior patterns detected')
"
        language: system
        pass_filenames: false
        always_run: true
        files: ^(src/.*\.py)$
        description: "Detect potential static behavior patterns"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
